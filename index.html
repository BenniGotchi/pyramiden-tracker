<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyramiden Tracker</title>
    
    <!-- Dies ist das Favicon (Emoji-Trick) -->
    <!-- Favicon mit verbesserter Kodierung -->

	<!-- Für den Browser-Tab -->
	<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%8E%3C/text%3E%3C/svg%3E">

	<!-- Für den Home-Bildschirm (Smartphone) -->
	<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234CAF50'/%3E%3Ctext y='.85em' x='.1em' font-size='75'%3E%F0%9F%8D%8E%3C/text%3E%3C/svg%3E">


    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Pyramiden-Layout */
        .pyramid-container { display: flex; flex-direction: column-reverse; align-items: center; gap: 5px; }
        .row { display: flex; gap: 5px; }

        /* Die einzelnen Bausteine */
        .box { width: 60px; height: 60px; border: 2px solid #333; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s ease; position: relative; }
        .box input { display: none; } /* Checkbox verstecken */
        .icon { font-size: 30px; filter: grayscale(100%); opacity: 0.5; transition: 0.3s; }

        /* Farben der Zeilen (nach Bildvorlage) */
        .row-6 .box { background-color: #c5e1a5; } /* Getränke - Hellgrün */
        .row-5 .box { background-color: #8bc34a; } /* Gemüse/Obst - Grün */
        .row-4 .box { background-color: #afb42b; } /* Getreide - Dunkelgrün */
        .row-3 .box { background-color: #fff176; } /* Milch/Fisch - Gelb */
        .row-2 .box { background-color: #fff176; } /* Öle/Nüsse - Gelb */
        .row-1 .box { background-color: #e57373; border-color: #c62828; } /* Extras - Rot */

        /* Aktivierter Zustand */
        .box input:checked + .icon { filter: grayscale(0%); opacity: 1; transform: scale(1.2); }
        .box input:checked { background-color: white; } /* Highlight-Effekt */

        .header { text-align: center; margin-bottom: 20px; }
        .reset-btn { margin-top: 30px; padding: 10px 20px; border-radius: 20px; border: 2px solid #333; background: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Mein Pyramiden-Tracker</h2>
        <p id="today"></p>
    </div>

    <div class="pyramid-container" id="pyramid">
        <!-- Zeile 6: Getränke -->
        <div class="row row-6">
            <label class="box"><input type="checkbox" id="w1"><span class="icon">💧</span></label>
            <label class="box"><input type="checkbox" id="w2"><span class="icon">💧</span></label>
            <label class="box"><input type="checkbox" id="w3"><span class="icon">💧</span></label>
            <label class="box"><input type="checkbox" id="w4"><span class="icon">💧</span></label>
            <label class="box"><input type="checkbox" id="w5"><span class="icon">💧</span></label>
            <label class="box"><input type="checkbox" id="w6"><span class="icon">💧</span></label>
        </div>
        <!-- Zeile 5: Gemüse & Obst -->
        <div class="row row-5">
            <label class="box"><input type="checkbox" id="v1"><span class="icon">🥦</span></label>
            <label class="box"><input type="checkbox" id="v2"><span class="icon">🥕</span></label>
            <label class="box"><input type="checkbox" id="v3"><span class="icon">🥦</span></label>
            <label class="box"><input type="checkbox" id="v4"><span class="icon">🍎</span></label>
            <label class="box"><input type="checkbox" id="v5"><span class="icon">🍎</span></label>
        </div>
        <!-- Zeile 4: Getreide -->
        <div class="row row-4">
            <label class="box"><input type="checkbox" id="g1"><span class="icon">🌾</span></label>
            <label class="box"><input type="checkbox" id="g2"><span class="icon">🍞</span></label>
            <label class="box"><input type="checkbox" id="g3"><span class="icon">🌾</span></label>
            <label class="box"><input type="checkbox" id="g4"><span class="icon">🥔</span></label>
        </div>
        <!-- Zeile 3: Milch & Fleisch -->
        <div class="row row-3">
            <label class="box"><input type="checkbox" id="m1"><span class="icon">🧀</span></label>
            <label class="box"><input type="checkbox" id="m2"><span class="icon">🥛</span></label>
            <label class="box"><input type="checkbox" id="f1"><span class="icon">🍗</span></label>
        </div>
        <!-- Zeile 2: Öle & Nüsse -->
        <div class="row row-2">
            <label class="box"><input type="checkbox" id="o1"><span class="icon">🫙</span></label>
            <label class="box"><input type="checkbox" id="o2"><span class="icon">🫒</span></label>
            <label class="box"><input type="checkbox" id="n1"><span class="icon">🥜</span></label>
        </div>
        <!-- Zeile 1: Extras (Süßes/Salziges) -->
        <div class="row row-1">
            <label class="box"><input type="checkbox" id="x1"><span class="icon">🍫</span></label>
        </div>
    </div>

    <button class="reset-btn" onclick="resetAll()">Alles zurücksetzen</button>

    <script>
        const dateStr = new Date().toLocaleDateString('de-DE');
        document.getElementById('today').innerText = dateStr;

        const checks = document.querySelectorAll('input[type="checkbox"]');

        // Laden & Reset bei neuem Tag
        function load() {
            if (localStorage.getItem('last_day') !== dateStr) {
                resetAll();
                localStorage.setItem('last_day', dateStr);
            } else {
                checks.forEach(c => {
                    if(localStorage.getItem(c.id) === 'true') c.checked = true;
                });
            }
        }

        // Speichern
        checks.forEach(c => {
            c.addEventListener('change', () => localStorage.setItem(c.id, c.checked));
        });

        function resetAll() {
            checks.forEach(c => {
                c.checked = false;
                localStorage.removeItem(c.id);
            });
        }

        load();
    </script>
</body>
</html>
